name: Install a tool
description: >
  Install one of the supported tool. Single-binary tools will be installed to
  $HOME/tools. This directory will be added to the PATH automatically.

inputs:
  tool:
    description: >
      The name of the tool to install. See the list of available tools in
      the scripts/install directory of the repo.
    required: true

  version:
    description: >
      The version of the tool to install. Not all tools support pinning a
      specific version, in which case the latest version will be installed.
    default: 'latest'

runs:
  using: composite
  steps:
    - shell: bash
      run: ${GITHUB_ACTION_PATH:?}/../scripts/install/$tool.sh
      env:
        tool: ${{ inputs.tool }}
        version: ${{ inputs.version }}
