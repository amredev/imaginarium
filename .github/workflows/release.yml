on:
  push:
    tags: [v*]

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  devcontainer-base:
    uses: ./.github/workflows/release-docker-image.yml
    with:
      image: devcontainer-base
    secrets: inherit

  devcontainer-decondenser:
    uses: ./.github/workflows/release-docker-image.yml
    with:
      image: devcontainer-decondenser
